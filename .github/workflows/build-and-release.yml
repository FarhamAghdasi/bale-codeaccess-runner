name: Build C++ Service

on:
  workflow_dispatch:

env:
  PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT_C }}
  PRIVATE_REPO: ${{ secrets.PRIVATE_REPO_NAME }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repository
        run: git clone https://x-access-token:${{ env.PRIVATE_REPO_PAT }}@github.com/${{ env.PRIVATE_REPO }}.git private-repo
        shell: cmd

      - name: Set VCPKG root (absolute path)
        run: echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
        shell: powershell

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}\vcpkg
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('private-repo/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Setup vcpkg
        run: |
          if (!(Test-Path "$env:VCPKG_ROOT\vcpkg.exe")) {
            Write-Host "Cloning vcpkg..."
            git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
            Set-Location "$env:VCPKG_ROOT"
            .\bootstrap-vcpkg.bat
          } else {
            Write-Host "vcpkg already exists, updating..."
            Set-Location "$env:VCPKG_ROOT"
            git pull origin master
            .\bootstrap-vcpkg.bat
          }
        shell: powershell

      - name: Install dependencies
        run: |
          Set-Location private-repo
          & "$env:VCPKG_ROOT\vcpkg" install openssl:x64-windows curl:x64-windows
        shell: powershell

      - name: Configure CMake
        run: |
          New-Item -ItemType Directory -Force -Path private-repo/build
          Set-Location private-repo/build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
        shell: powershell

      - name: Build Release
        run: |
          Set-Location private-repo/build
          cmake --build . --config Release
        shell: powershell

      - name: Verify executable
        run: |
          if (Test-Path "private-repo/build/Release/client.exe") {
            Write-Host "Build successful"
          } else {
            Write-Host "ERROR: client.exe not found"
            exit 1
          }
        shell: powershell

      - name: Create Release and upload asset
        run: |
          $tag = "build-$((Get-Date).ToString('yyyyMMdd-HHmmss'))"
          $releaseName = "Service Client Build - $(Get-Date -Format 'yyyy-MM-dd HH:mm')"

          $body = @{
            tag_name = $tag
            name = $releaseName
            body = "Automated build from GitHub Actions"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $createResponse = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ env.PRIVATE_REPO }}/releases" `
            -Method Post `
            -Headers @{ 
              Authorization = "Bearer ${{ env.PRIVATE_REPO_PAT }}"
              Accept = "application/vnd.github.v3+json"
            } `
            -Body $body `
            -ContentType "application/json"

          $uploadUrl = $createResponse.upload_url -replace '{.*$}', ''

          $assetPath = Resolve-Path "private-repo/build/Release/client.exe"
          $uploadUri = "$uploadUrl?name=client.exe"

          Invoke-RestMethod -Uri $uploadUri `
            -Method Post `
            -Headers @{ Authorization = "Bearer ${{ env.PRIVATE_REPO_PAT }}" } `
            -InFile $assetPath `
            -ContentType "application/octet-stream"

          Write-Host "Release created and asset uploaded"
        shell: powershell
