name: Build C++ Service

on:
  workflow_dispatch:

env:
  PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT_C }}
  PRIVATE_REPO: ${{ secrets.PRIVATE_REPO_NAME }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repository
        run: git clone https://x-access-token:${{ env.PRIVATE_REPO_PAT }}@github.com/${{ env.PRIVATE_REPO }}.git private-repo
        shell: cmd

      - name: Setup vcpkg with caching
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: 'C:/vcpkg'
          vcpkgJsonGlob: '**/vcpkg.json'  # در صورت نداشتن این فایل، تنظیم زیر کار می‌کنه
          vcpkgTriplet: 'x64-windows'
          # خط زیر باعث می‌شه vcpkg همیشه از آخرین نسخه استفاده کنه
          vcpkgGitCommitId: 'd60ec9c7c4a8e2ddb0adfc7f3f806033adf9cef3'

      - name: Install dependencies
        run: |
          cd private-repo
          C:\vcpkg\vcpkg install openssl:x64-windows curl:x64-windows
        shell: cmd

      - name: Configure CMake
        run: |
          cd private-repo
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
        shell: cmd

      - name: Build Release
        run: |
          cd private-repo/build
          cmake --build . --config Release
        shell: cmd

      - name: Verify executable
        run: |
          if exist "private-repo\build\Release\client.exe" ( echo Build successful ) else ( echo ERROR: client.exe not found & exit /b 1 )
        shell: cmd

      - name: Create Release and upload asset
        run: |
          $tag = "build-$((Get-Date).ToString('yyyyMMdd-HHmmss'))"
          $releaseName = "Service Client Build - $(Get-Date -Format 'yyyy-MM-dd HH:mm')"

          $body = @{
            tag_name = $tag
            name = $releaseName
            body = "Automated build"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $createResponse = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ env.PRIVATE_REPO }}/releases" `
            -Method Post `
            -Headers @{ Authorization = "Bearer ${{ env.PRIVATE_REPO_PAT }}"; Accept = "application/vnd.github.v3+json" } `
            -Body $body `
            -ContentType "application/json"

          $uploadUrl = $createResponse.upload_url -replace '{.*$', ''

          # استفاده از curl.exe برای آپلود، چون در این مرحله با خطای alias تداخلی نداره
          curl.exe -L -X POST -H "Authorization: Bearer ${{ env.PRIVATE_REPO_PAT }}" -H "Content-Type: application/octet-stream" --upload-file "private-repo/build/Release/client.exe" "$uploadUrl?name=client.exe"

          Write-Host "Release created and asset uploaded"
        shell: powershell
