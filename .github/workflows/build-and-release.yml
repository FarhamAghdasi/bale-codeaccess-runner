name: Build C++ Service

on:
  workflow_dispatch:

env:
  PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT_C }}
  PRIVATE_REPO: ${{ secrets.PRIVATE_REPO_NAME }}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Clone private repository
        run: |
          git clone https://x-access-token:${{ env.PRIVATE_REPO_PAT }}@github.com/${{ env.PRIVATE_REPO }}.git private-repo
        shell: cmd

      - name: Download OpenSSL binaries (pre-compiled)
        run: |
          curl -L -o openssl.exe https://slproweb.com/download/Win64OpenSSL-3_3_0.exe
          mkdir C:\OpenSSL
          .\openssl.exe /silent /verysilent /suppressmsgboxes /dir="C:\OpenSSL"
        shell: powershell

      - name: Download libcurl binaries (pre-compiled)
        run: |
          curl -L -o curl.zip https://curl.se/windows/dl-8.9.1_3/curl-8.9.1_3-win64-mingw.zip
          7z x curl.zip -oC:\curl -y
        shell: powershell

      - name: Configure CMake with custom paths
        run: |
          cd private-repo
          mkdir build -Force
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DOPENSSL_ROOT_DIR=C:\OpenSSL `
            -DOPENSSL_INCLUDE_DIR=C:\OpenSSL\include `
            -DOPENSSL_CRYPTO_LIBRARY="C:\OpenSSL\lib\libcrypto.lib" `
            -DOPENSSL_SSL_LIBRARY="C:\OpenSSL\lib\libssl.lib" `
            -DCURL_INCLUDE_DIR=C:\curl\include `
            -DCURL_LIBRARY="C:\curl\lib\libcurl.dll.a"
        shell: powershell

      - name: Build Release
        run: |
          cd private-repo/build
          cmake --build . --config Release
        shell: cmd

      - name: Verify executable
        run: |
          if exist "private-repo\build\Release\client.exe" (
            echo Build successful
          ) else (
            echo ERROR: client.exe not found
            exit /b 1
          )
        shell: cmd

      - name: Create Release and upload asset
        run: |
          $tag = "build-$((Get-Date).ToString('yyyyMMdd-HHmmss'))"
          $releaseName = "Service Client Build - $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
          
          $body = @{
            tag_name = $tag
            name = $releaseName
            body = "Automated build"
            draft = $false
            prerelease = $false
          } | ConvertTo-Json
          
          $createResponse = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ env.PRIVATE_REPO }}/releases" `
            -Method Post `
            -Headers @{ 
              Authorization = "Bearer ${{ env.PRIVATE_REPO_PAT }}"
              Accept = "application/vnd.github.v3+json"
            } `
            -Body $body `
            -ContentType "application/json"
          
          $uploadUrl = $createResponse.upload_url -replace '{.*$', ''
          
          curl.exe -L `
            -X POST `
            -H "Authorization: Bearer ${{ env.PRIVATE_REPO_PAT }}" `
            -H "Content-Type: application/octet-stream" `
            --upload-file "private-repo/build/Release/client.exe" `
            "$uploadUrl?name=client.exe"
          
          Write-Host "Release created and asset uploaded"
        shell: powershell
